<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="manifest" href="/site.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InnovaCX Pamphlet</title>
  <style>
    :root{
      --bg:#040010;
      --panel:#090313;
      --panel-2:#0d0418;
      --line:rgba(192,132,252,.28);
      --text:#f4eeff;
      --muted:rgba(244,238,255,.64);
      --orchid:#a855f7;
      --pink:#c084fc;
      --fuchsia:#e879f9;
      --cyan:#22d3ee;
      --amber:#fbbf24;
      --green:#34d399;
      --red:#f87171;
    }
    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800;900&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');
    body{
      font-family:'DM Sans',system-ui,-apple-system,sans-serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(168,85,247,.18), transparent 28%),
        radial-gradient(circle at 80% 75%, rgba(34,211,238,.12), transparent 25%),
        linear-gradient(180deg, #090014 0%, #040010 55%, #020007 100%);
      color:var(--text);
      overflow:hidden;
    }
    #stage{position:fixed;inset:0;z-index:2}
    canvas{display:block;width:100%;height:100%}
    #starfield{position:fixed;inset:0;pointer-events:none;z-index:2}
    #logobg{position:fixed;inset:0;pointer-events:none;z-index:2}
    #brochure{position:relative;z-index:1}
    .hud{
      position:fixed;left:24px;right:24px;top:20px;display:flex;justify-content:space-between;gap:16px;align-items:flex-start;pointer-events:none;
      z-index:30;
    }
    .brand,.controls,.footer-note{pointer-events:auto}
    .brand{
      max-width:420px;padding:16px 18px;border:1px solid var(--line);border-radius:18px;
      background:linear-gradient(180deg, rgba(10,5,22,.82), rgba(8,4,18,.58));
      backdrop-filter: blur(14px);
      box-shadow:0 18px 70px rgba(0,0,0,.35);
    }
    .eyebrow{font-size:12px;letter-spacing:.22em;text-transform:uppercase;color:var(--pink);margin-bottom:10px;font-family:'DM Sans',sans-serif}
    h1{font-size:32px;line-height:1.04;margin:0 0 12px;font-weight:900;letter-spacing:-.04em;font-family:'Syne',sans-serif}
    .sub{font-size:16px;line-height:1.55;color:var(--muted);margin:0;font-family:'DM Sans',sans-serif}
    .controls{
      display:flex;flex-direction:column;gap:10px;align-items:flex-end;
    }
    .btnrow{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    button{
      appearance:none;border:none;cursor:pointer;padding:11px 16px;border-radius:999px;font-weight:700;
      color:var(--text);background:rgba(168,85,247,.14);border:1px solid rgba(192,132,252,.32);
      box-shadow:0 8px 28px rgba(0,0,0,.22);
    }
    button:hover{background:rgba(168,85,247,.22)}
    .ghost{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.12)}
    .slider-wrap{
      width:min(360px, 62vw);display:flex;gap:12px;align-items:center;padding:12px 14px;border-radius:999px;
      background:rgba(8,4,18,.7);border:1px solid var(--line);
    }
    .slider-wrap span{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
    input[type="range"]{flex:1;accent-color:#a855f7}
    .footer-note{display:none}
    .side-nav{
      position:fixed;top:50%;transform:translateY(-50%);z-index:20;pointer-events:auto;
      width:62px;height:62px;border-radius:22px;display:flex;align-items:center;justify-content:center;
      padding:0;background:linear-gradient(180deg, rgba(18,8,34,.9), rgba(10,5,22,.78));
      border:1px solid rgba(192,132,252,.34); color:var(--text);
      box-shadow:0 16px 38px rgba(0,0,0,.32), inset 0 1px 0 rgba(255,255,255,.06);
      backdrop-filter: blur(14px); transition:transform .18s ease, background .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .side-nav::before{
      content:""; position:absolute; inset:1px; border-radius:20px;
      background:linear-gradient(180deg, rgba(255,255,255,.045), rgba(255,255,255,0));
      pointer-events:none;
    }
    .side-nav:hover{
      background:linear-gradient(180deg, rgba(41,16,74,.96), rgba(22,9,40,.88));
      border-color:rgba(232,121,249,.5); box-shadow:0 20px 46px rgba(0,0,0,.36), 0 0 0 1px rgba(232,121,249,.08);
      transform:translateY(-50%) scale(1.03);
    }
    .side-nav:active{transform:translateY(-50%) scale(.97)}
    .side-nav svg{width:24px;height:24px;position:relative;z-index:1;opacity:.96}
    .side-nav.left{left:18px}
    .side-nav.right{right:18px}
    @media (max-width: 800px){
      .hud{flex-direction:column;align-items:stretch}
      .controls{align-items:stretch}
      .btnrow{justify-content:flex-start}
      .slider-wrap{width:100%}
      .brand{max-width:none}
      h1{font-size:28px}
    }

    /* ── Solar System Background ── */
    #solar-bg-wrap{
      position:fixed;left:-28vw;top:0;width:80vw;height:100vh;
      pointer-events:none;z-index:1;overflow:hidden;
    }
    #solar-mount{position:absolute;inset:0;width:100%;height:100%;}
    #solar-mount canvas{position:absolute;inset:0;width:100%!important;height:100%!important;}
    #solar-labels{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
    .ss-planet-label{
      position:absolute;pointer-events:none;
      font-family:'DM Sans',system-ui,sans-serif;font-size:9px;font-weight:700;
      letter-spacing:.04em;color:#e9d5ff;background:rgba(20,4,40,.80);
      border:1px solid rgba(168,85,247,.55);border-radius:5px;padding:2px 6px;
      white-space:nowrap;box-shadow:0 0 8px rgba(168,85,247,.28);
      opacity:0;transition:opacity .25s;transform:translate(-50%,-100%);
    }
    .ss-sun-label{
      position:absolute;pointer-events:none;
      font-family:'DM Sans',system-ui,sans-serif;font-size:10px;font-weight:700;
      letter-spacing:.05em;color:#ffd580;background:rgba(30,10,0,.88);
      border:1px solid rgba(255,180,50,.65);border-radius:5px;padding:2px 8px;
      white-space:nowrap;box-shadow:0 0 10px rgba(255,160,30,.35);
      transform:translate(-50%,-100%);
    }
  </style>
</head>

  <style>
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(circle at 50% 40%, rgba(168,85,247,.22), transparent 55%),
                  linear-gradient(180deg, #080012 0%, #040010 60%, #020007 100%);
      transition: opacity 0.9s ease, visibility 0.9s ease;
    }
    #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    #splash-inner {
      display: flex; flex-direction: column; align-items: center; gap: 28px;
      text-align: center; padding: 72px 72px;
      border: 1px solid rgba(168,85,247,.25); border-radius: 36px;
      background: rgba(9,3,19,.72); backdrop-filter: blur(18px);
      box-shadow: 0 0 80px rgba(168,85,247,.15), 0 28px 80px rgba(0,0,0,.5);
      animation: splashFadeIn 0.7s ease forwards;
    }
    @keyframes splashFadeIn {
      from { opacity:0; transform: translateY(12px); }
      to   { opacity:1; transform: translateY(0); }
    }
    #splash-logo-ring {
      width: 140px; height: 140px;
      animation: splashSpin 6s linear infinite;
    }
    @keyframes splashSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    #splash-eyebrow {
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; letter-spacing: .22em; text-transform: uppercase;
      color: #c084fc; margin-bottom: -12px;
    }
    #splash-title {
      font-family: 'Syne', sans-serif;
      font-size: 80px; font-weight: 900; letter-spacing: -.04em;
      background: linear-gradient(135deg, #e9d5ff 0%, #c084fc 50%, #e879f9 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; line-height: 1;
    }
    #splash-tagline {
      font-family: 'DM Sans', sans-serif;
      font-size: 20px; line-height: 1.65;
      color: rgba(244,238,255,.58); max-width: 400px;
    }
    #splash-dots { display: flex; gap: 12px; margin-top: 8px; }
    #splash-dots span {
      width: 11px; height: 11px; border-radius: 50%;
      background: #a855f7; opacity: 0.2;
      animation: splashPulse 1.4s ease-in-out infinite;
    }
    #splash-dots span:nth-child(2) { animation-delay: .22s; }
    #splash-dots span:nth-child(3) { animation-delay: .44s; }
    @keyframes splashPulse {
      0%, 80%, 100% { opacity: .2; transform: scale(1); }
      40%            { opacity: 1;  transform: scale(1.35); }
    }
  </style>

  <script>
  (() => {
    const sf = document.getElementById('starfield');
    const ctx = sf.getContext('2d');
    const resize = () => { sf.width = window.innerWidth; sf.height = window.innerHeight; };
    resize();
    window.addEventListener('resize', resize);

    const stars = Array.from({length: 380}, () => ({
      x: Math.random(), y: Math.random(),
      r: Math.random() * 1.5 + 0.2,
      twinkle: Math.random() * Math.PI * 2,
      speed: Math.random() * 0.018 + 0.004,
      color: Math.random() > 0.8 ? "#c4b5fd" : Math.random() > 0.6 ? "#e9d5ff" : "#fff",
    }));

    const shooters = Array.from({length: 9}, (_, idx) => ({
      x: Math.random() * 0.6, y: Math.random() * 0.5,
      len: Math.random() * 180 + 80, speed: Math.random() * 5 + 3,
      angle: Math.PI / 5.5 + (Math.random() - 0.5) * 0.35,
      active: false, timer: Math.random() * 260 + 50 + idx * 90, alpha: 0,
    }));

    function drawStars() {
      ctx.clearRect(0, 0, sf.width, sf.height);
      stars.forEach(s => {
        s.twinkle += s.speed;
        ctx.globalAlpha = Math.max(0.05, 0.3 + Math.sin(s.twinkle) * 0.55);
        ctx.fillStyle = s.color;
        ctx.beginPath();
        ctx.arc(s.x * sf.width, s.y * sf.height, s.r, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.globalAlpha = 1;
      shooters.forEach(s => {
        s.timer--;
        if (s.timer <= 0 && !s.active) { s.active = true; s.alpha = 1; }
        if (s.active) {
          s.x += Math.cos(s.angle) * s.speed / sf.width;
          s.y += Math.sin(s.angle) * s.speed / sf.height;
          s.alpha -= 0.012;
          if (s.alpha <= 0 || s.x > 1.1) {
            s.active = false;
            s.x = Math.random() * 0.55; s.y = Math.random() * 0.45;
            s.timer = Math.random() * 350 + 80;
            s.angle = Math.PI / 5.5 + (Math.random() - 0.5) * 0.35;
            s.len = Math.random() * 180 + 80;
          }
          ctx.save(); ctx.globalAlpha = s.alpha;
          const g = ctx.createLinearGradient(
            s.x * sf.width, s.y * sf.height,
            (s.x - Math.cos(s.angle) * s.len / sf.width) * sf.width,
            (s.y - Math.sin(s.angle) * s.len / sf.height) * sf.height
          );
          g.addColorStop(0, "#e9d5ff"); g.addColorStop(1, "transparent");
          ctx.beginPath();
          ctx.moveTo(s.x * sf.width, s.y * sf.height);
          ctx.lineTo(
            (s.x - Math.cos(s.angle) * s.len / sf.width) * sf.width,
            (s.y - Math.sin(s.angle) * s.len / sf.height) * sf.height
          );
          ctx.strokeStyle = g; ctx.lineWidth = 1.8; ctx.stroke();
          ctx.restore();
        }
      });
      requestAnimationFrame(drawStars);
    }
    drawStars();
  })();
  </script>

function buildPanel(frontTex, backTex) {
      const geom = new THREE.BoxGeometry(PANEL_W, PANEL_H, PANEL_D, 1, 1, 1);
      const mats = [
        panelMatSide, panelMatSide, panelMatSide, panelMatSide,
        new THREE.MeshStandardMaterial({ map: frontTex, roughness: 0.9, metalness: 0.02 }),
        new THREE.MeshStandardMaterial({ map: backTex, roughness: 0.92, metalness: 0.02 })
      ];
      const mesh = new THREE.Mesh(geom, mats);
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      return mesh;
    }

    const centerGroup = new THREE.Group();
    const leftGroup = new THREE.Group();
    const rightGroup = new THREE.Group();

    const centerPanel = buildPanel(textures.problemInside, textures.securityOutside);
    const leftPanel = buildPanel(textures.productInside, textures.backCover);
    const rightPanel = buildPanel(textures.pipelineInside, textures.frontCover);

    // Refresh front cover texture once logo loads (rebuilds the canvas texture)
    _frontCoverTexRefresh = () => {
      const freshFront = makeTexture((ctx,w,h) => {
        // re-run frontCover draw
        const fc = textures._frontCoverDraw;
        if (fc) fc(ctx, w, h);
      });
      if (rightPanel.material[5]) {
        rightPanel.material[5].map = textures.frontCover;
        rightPanel.material[5].map.needsUpdate = true;
      }
    };

    centerGroup.add(centerPanel);
    leftPanel.position.x = -PANEL_W / 2;
    rightPanel.position.x = PANEL_W / 2;
    leftGroup.add(leftPanel);
    rightGroup.add(rightPanel);

    leftGroup.position.x = -PANEL_W / 2;
    rightGroup.position.x = PANEL_W / 2;
    leftGroup.position.z = -0.022;
    rightGroup.position.z = 0.024;

    world.add(centerGroup, leftGroup, rightGroup);
    world.position.y = 0.02;

    const rimMat = new THREE.LineBasicMaterial({ color: 0xc084fc, transparent: true, opacity: 0.18 });
    [centerPanel,leftPanel,rightPanel].forEach(panel => {
      const edges = new THREE.EdgesGeometry(panel.geometry);
      const line = new THREE.LineSegments(edges, rimMat);
      panel.add(line);
    });

    let openness = 0; // 1=open, 0=closed
    let targetOpenness = 0;
    let flipView = false;

    function applyFold(t) {
      const e = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t + 2, 2) / 2;
      leftGroup.rotation.y = Math.PI * (1 - e);
      rightGroup.rotation.y = -Math.PI * (1 - e);
      leftGroup.position.z = -0.022 + (1 - e) * -0.018;
      rightGroup.position.z = 0.024 + (1 - e) * 0.03;
      centerPanel.position.z = (1 - e) * -0.014;
      world.rotation.y = flipRotation;
    }

    const slider = document.getElementById('progress');
    const pct = document.getElementById('pct');
    slider.addEventListener('input', () => {
      targetOpenness = slider.value / 100;
      pct.textContent = slider.value + '%';
    });
    document.getElementById('openBtn').onclick = () => { targetOpenness = 1.0; slider.value = 100; pct.textContent = '100%'; };
    document.getElementById('closeBtn').onclick = () => { targetOpenness = 0; slider.value = 0; pct.textContent = '0%'; };
    document.getElementById('flipBtn').onclick = () => { flipView = !flipView; targetFlipRotation = flipView ? Math.PI : 0; };
    document.getElementById('resetBtn').onclick = () => {
      targetOpenness = 0; slider.value = 0; pct.textContent = '0%';
      targetYaw = -0.16; targetPitch = 0.18; targetDistance = 6.7;
      targetPanX = 0; flipView = false; targetFlipRotation = 0;
    };
    const clampPan = v => Math.max(-1.15, Math.min(1.15, v));
    document.getElementById('panLeftBtn').onclick = () => { targetPanX = clampPan(targetPanX - 0.32); };
    document.getElementById('panRightBtn').onclick = () => { targetPanX = clampPan(targetPanX + 0.32); };

    let dragging = false;
    let lx = 0, ly = 0;
    canvas.addEventListener('mousedown', e => { dragging = true; lx = e.clientX; ly = e.clientY; });
    window.addEventListener('mouseup', () => dragging = false);
    window.addEventListener('mousemove', e => {
      if (!dragging) return;
      const dx = e.clientX - lx;
      const dy = e.clientY - ly;
      targetYaw += dx * 0.0065;
      targetPitch = Math.max(-0.18, Math.min(0.72, targetPitch + dy * 0.004));
      lx = e.clientX; ly = e.clientY;
    });
    canvas.addEventListener('wheel', e => {
      e.preventDefault();
      targetDistance = Math.max(3.9, Math.min(10.8, targetDistance + e.deltaY * 0.006));
    }, { passive:false });

    canvas.addEventListener('touchstart', e => {
      if (!e.touches[0]) return;
      dragging = true; lx = e.touches[0].clientX; ly = e.touches[0].clientY;
    }, { passive:true });
    canvas.addEventListener('touchmove', e => {
      if (!dragging || !e.touches[0]) return;
      const dx = e.touches[0].clientX - lx;
      const dy = e.touches[0].clientY - ly;
      targetYaw += dx * 0.0065;
      targetPitch = Math.max(-0.18, Math.min(0.72, targetPitch + dy * 0.004));
      lx = e.touches[0].clientX; ly = e.touches[0].clientY;
    }, { passive:true });
    canvas.addEventListener('touchend', () => dragging = false, { passive:true });

    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }
    window.addEventListener('resize', resize);
    resize();

    const clock = new THREE.Clock();
    function tick() {
      requestAnimationFrame(tick);
      const dt = Math.min(clock.getDelta(), 0.03);
      openness += (targetOpenness - openness) * Math.min(1, dt * 7);
      yaw += (targetYaw - yaw) * Math.min(1, dt * 6);
      pitch += (targetPitch - pitch) * Math.min(1, dt * 6);
      distance += (targetDistance - distance) * Math.min(1, dt * 6);
      flipRotation += (targetFlipRotation - flipRotation) * Math.min(1, dt * 6);
      panX += (targetPanX - panX) * Math.min(1, dt * 7);

      applyFold(openness);
      lookTarget.x = panX;

      const cx = Math.sin(yaw) * Math.cos(pitch) * distance + panX;
      const cy = Math.sin(pitch) * distance + 0.55;
      const cz = Math.cos(yaw) * Math.cos(pitch) * distance;
      camera.position.set(cx, cy, cz);
      camera.lookAt(lookTarget);

      purple.position.x = -4 + Math.sin(performance.now() * 0.00055) * 1.2;
      purple.position.z = 2.5 + Math.cos(performance.now() * 0.00042) * 1.0;
      cyan.position.x = 4 + Math.sin(performance.now() * 0.00036) * 1.1;
      stageRing.material.opacity = 0.16 + openness * 0.06;

      renderer.render(scene, camera);
    }
    tick();
  })();

      var H = mount.clientHeight || window.innerHeight || 600;

      var renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
      renderer.setSize(W,H);
      renderer.setClearColor(0x000000,0);
      mount.appendChild(renderer.domElement);

      var scene  = new THREE.Scene();
      var camDist = 110, camTheta = 0.52, camPhi = 1.22;
      var camera  = new THREE.PerspectiveCamera(48, W/H, 0.1, 800);
      function setCam() {
        camera.position.set(
          camDist*Math.sin(camPhi)*Math.cos(camTheta),
          camDist*Math.cos(camPhi),
          camDist*Math.sin(camPhi)*Math.sin(camTheta));
        camera.lookAt(0,0,0);
      }
      setCam();

      function toScreen(wp,CW,CH) {
        var v=wp.clone().project(camera);
        return {x:(v.x*.5+.5)*CW, y:(v.y*-.5+.5)*CH, behind:v.z>1};
      }

      scene.add(new THREE.PointLight(0xfff4d6,6.5,320));
      scene.add(new THREE.AmbientLight(0x8866aa,0.45));

        float hash(vec3 p){p=fract(p*vec3(443.897,441.423,437.195));p+=dot(p,p.yzx+19.19);return fract((p.x+p.y)*p.z);}

        void main(){
          vec3 sp=normalize(vPos);

          float limbDark=mix(0.78,1.0,1.0-0.55*(1.0-sqrt(max(0.0,1.0-r2d*r2d))));

                     *mix(0.76,1.0,smoothstep(0.02,0.07,acos(clamp(dot(sp,normalize(vec3(sin(uTime*.04+2.09),sin(uTime*.035)*.50,cos(uTime*.04+2.09)))),-1.0,1.0))));

          col.r=max(col.r,.52);col.g=max(col.g,col.r*.38);col.b=max(col.b,0.0);col.b=min(col.b,col.g*.35);

      var sunU={uTime:{value:0}};
      var sun=new THREE.Mesh(new THREE.SphereGeometry(3.2,96,96),new THREE.ShaderMaterial({vertexShader:sunVS,fragmentShader:sunFS,uniforms:sunU,lights:false}));
      scene.add(sun);

      var cVS2=`varying vec3 vPos;void main(){vPos=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`;
      var cFS2=`varying vec3 vPos;void main(){float r=clamp((length(vPos)-3.2)/(3.2*3.0),0.0,1.0);gl_FragColor=vec4(mix(vec3(1.0,.90,.60),vec3(1.0,.65,.20),r),exp(-r*4.5)*.55);}`;
      scene.add(new THREE.Mesh(new THREE.SphereGeometry(3.2*4.8,48,48),new THREE.ShaderMaterial({vertexShader:cVS2,fragmentShader:cFS2,transparent:true,side:THREE.BackSide,blending:THREE.AdditiveBlending,depthWrite:false,lights:false})));

      var sunLbl=document.createElement('div');sunLbl.className='ss-sun-label';sunLbl.textContent='Orchestrator';labelDiv.appendChild(sunLbl);

      function h21(x,y,s){var n=Math.sin(x*127.1+y*311.7+s*74.3)*43758.5453;return n-Math.floor(n);}
      function sn(lat,lon,sc,s){var cx=Math.cos(lat)*Math.cos(lon)*sc,cy=Math.cos(lat)*Math.sin(lon)*sc,cz=Math.sin(lat)*sc;var ix=Math.floor(cx),iy=Math.floor(cy),iz=Math.floor(cz),fx=cx-ix,fy=cy-iy,fz=cz-iz,ux=fx*fx*(3-2*fx),uy=fy*fy*(3-2*fy),uz=fz*fz*(3-2*fz);var v=function(dx,dy,dz){return h21(ix+dx+(iy+dy)*7+(iz+dz)*13,s,0);};return v(0,0,0)*(1-ux)*(1-uy)*(1-uz)+v(1,0,0)*ux*(1-uy)*(1-uz)+v(0,1,0)*(1-ux)*uy*(1-uz)+v(1,1,0)*ux*uy*(1-uz)+v(0,0,1)*(1-ux)*(1-uy)*uz+v(1,0,1)*ux*(1-uy)*uz+v(0,1,1)*(1-ux)*uy*uz+v(1,1,1)*ux*uy*uz;}

      var smx=function(a,b,t){return a+(b-a)*Math.max(0,Math.min(1,t));};

      function makeTex(THREE,pers,seed){
        var TW=512,TH=256,px4=new Uint8Array(TW*TH*4),bm4=new Uint8Array(TW*TH*4);
        for(var py=0;py<TH;py++)for(var lpx=0;lpx<TW;lpx++){
          var lat=((py/TH)-.5)*Math.PI,lon=(lpx/TW)*Math.PI*2,absLat=Math.abs(lat)/(Math.PI/2),r,g,b;
          if(pers==='mercury'){var t=fbmP(lat,lon,5,3,seed),d=fbmP(lat,lon,3,7,seed+50),h=t*.6+d*.4,base=.38+h*.38;r=base*1.05;g=base*.98;b=base*.90;var cr=fbmP(lat,lon,2,11,seed+200);if(cr>.72){var dd=(cr-.72)/.28;r*=1-dd*.6;g*=1-dd*.6;b*=1-dd*.55;}var ray=fbmP(lat,lon,2,15,seed+300);if(ray>.80){var e=(ray-.80)/.20;r=smx(r,.85,e*.5);g=smx(g,.80,e*.5);b=smx(b,.72,e*.5);}
          }else if(pers==='venus'){var c1=fbmP(lat,lon*.9+lat*.3,5,2,seed),c2=fbmP(lat+c1*.5,lon,4,4,seed+80),cl=c1*.55+c2*.45;r=.82+cl*.17;g=.68+cl*.18;b=.22+cl*.14;if(absLat>.72){var p=(absLat-.72)/.28;r=smx(r,.95,p);g=smx(g,.88,p);b=smx(b,.55,p);}
          }else if(pers==='earth'){var co=fbmP(lat,lon,6,2.2,seed),cld=fbmP(lat,lon,4,3.5,seed+400),isl=co>.52;if(isl){var hh=(co-.52)/.48;r=smx(.30,.52,hh);g=smx(.42,.36,hh);b=smx(.18,.20,hh);}else{var dep=co/.52;r=smx(.04,.12,dep);g=smx(.18,.38,dep);b=smx(.55,.72,dep);}if(cld>.58){var cv=(cld-.58)/.42;r=smx(r,.90,cv*.85);g=smx(g,.92,cv*.85);b=smx(b,.95,cv*.85);}if(absLat>.76){var ic=fbmP(lat,lon,3,4,seed+600),pp=(absLat-.76)/.24*(.7+ic*.3);r=smx(r,.92,pp);g=smx(g,.95,pp);b=smx(b,1.0,pp);}
          }else if(pers==='mars'){var t2=fbmP(lat,lon,5,2.5,seed),d2=fbmP(lat,lon,4,6,seed+60),h2=t2*.65+d2*.35;r=.62+h2*.28;g=.22+h2*.16;b=.10+h2*.08;if(h2<.38){var dd2=(.38-h2)/.38;r*=1-dd2*.35;g*=1-dd2*.3;b*=1-dd2*.2;}var cn=fbmP(lat,lon,3,5,seed+150);if(Math.abs(lat)<.18&&cn>.70){var cn2=(cn-.70)/.30;r*=1-cn2*.5;g*=1-cn2*.45;b*=1-cn2*.3;}if(absLat>.82){var pm=(absLat-.82)/.18;r=smx(r,.88,pm);g=smx(g,.82,pm);b=smx(b,.78,pm);}
          }else if(pers==='jupiter'){var w=fbmP(lat,lon,3,1.5,seed+10)*1.2-.6,wl=lat+w*.55,bd=Math.sin(wl*4.5)*.5+.5,tb=fbmP(lat,lon,4,3,seed+100)*.28,mx2=bd*.72+tb;r=smx(.68,.92,mx2);g=smx(.38,.74,mx2);b=smx(.18,.50,mx2);var gL=lat+.34,gO=Math.min(Math.abs(lon-Math.PI*1.1),Math.PI*2-Math.abs(lon-Math.PI*1.1))*2.2,grs=gL*gL*16+gO*gO;if(grs<.20){var gi=(.20-grs)/.20;r=smx(r,.82,gi*.9);g=smx(g,.28,gi*.7);b=smx(b,.18,gi*.5);}

          }else if(pers==='uranus'){var sm2=fbmP(lat,lon,3,1.5,seed)*.18,fa=Math.sin(lat*3)*.08,h3=.50+sm2+fa;r=smx(.42,.62,h3)*.80;g=smx(.72,.90,h3);b=smx(.78,.95,h3);if(absLat>.70){var pp3=(absLat-.70)/.30;r=smx(r,.72,pp3*.4);g=smx(g,.95,pp3*.3);b=smx(b,1.0,pp3*.3);}

      var mp={mercury:{bumpScale:.8,shininess:8,specular:[.20,.18,.15]},venus:{bumpScale:.2,shininess:45,specular:[.55,.45,.20]},earth:{bumpScale:.5,shininess:30,specular:[.20,.35,.60]},mars:{bumpScale:.7,shininess:10,specular:[.25,.12,.08]},jupiter:{bumpScale:.15,shininess:18,specular:[.30,.22,.12]},saturn:{bumpScale:.12,shininess:22,specular:[.35,.28,.15]},uranus:{bumpScale:.08,shininess:60,specular:[.40,.65,.75]},neptune:{bumpScale:.25,shininess:40,specular:[.20,.30,.70]}};

      var planetObjects=[],orbitMeshes=[],angles=PLANET_3D.map(function(p){return p.startAngle;}),labelEls=[],autoRotY=0;

        var CW=mount.clientWidth,CH=mount.clientHeight;

        });

      }
      animate();

      // Dismiss splash screen now that the solar system is running
      var splash = document.getElementById('splash');
      if (splash) {
        setTimeout(function() {
          splash.classList.add('hidden');
          setTimeout(function() { splash.remove(); }, 1000);
        }, 800);
      }

      window.addEventListener('resize',function(){
        var W2=mount.clientWidth||window.innerWidth*.52,H2=mount.clientHeight||window.innerHeight;
        camera.aspect=W2/H2;camera.updateProjectionMatrix();renderer.setSize(W2,H2);
      });
    }

    /* THREE.js is already loaded by the pamphlet - wait for it then init */
    function tryInit(){
      if(window.THREE){setTimeout(initSS,200);}
      else{setTimeout(tryInit,100);}
    }
    tryInit();
